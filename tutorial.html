<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial Convert PDF ke PPT</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            background: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px; /* Ukuran maksimal di desktop */
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #177882;
            font-size: 1.5rem; /* Ukuran font yang adaptif */
            margin-top: 0;
            text-align: center;
        }
        ol {
            line-height: 1.6;
            padding-left: 20px;
            color: #444;
        }
        li {
            margin-bottom: 10px;
        }
        .confirmation-area {
            background: #e8f4f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label {
            cursor: pointer;
            font-size: 0.95rem;
            user-select: none;
        }
        .btn {
            display: block;
            width: 100%; /* Tombol lebar penuh agar mudah ditekan di HP */
            margin-top: 20px;
            padding: 15px;
            background: #177882;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn:not(:disabled):hover {
            background: #125f66;
        }

        /* Pengaturan khusus untuk layar sangat kecil (HP) */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tutorial Convert PDF ke PPT</h1>

    <ol>
        <li>Buka website converter</li>
        <li>Klik Choose Files</li>
        <li>Upload file PDF hasil report</li>
        <li>Pilih format output menjadi PPT</li>
        <li>Klik tombol <strong>Convert</strong></li>
        <li>Download hasil PPT</li>
    </ol>

    <div class="confirmation-area">
        <input type="checkbox" id="confirmCheck" style="transform: scale(1.2);">
        <label for="confirmCheck">Saya sudah memahami langkah-langkah di atas.</label>
    </div>

    <button class="btn" id="convertBtn" disabled onclick="startConvert()">
        Mulai Convert Sekarang
    </button>
</div>

<script>
    const checkbox = document.getElementById('confirmCheck');
    const btn = document.getElementById('convertBtn');

    checkbox.addEventListener('change', function() {
        btn.disabled = !this.checked;
    });

    function startConvert() {
        window.open("https://www.freeconvert.com/pdf-to-ppt", "_blank");
    }
</script>

</body>
</html>
